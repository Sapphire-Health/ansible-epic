---
  - name: Provision Epic Server
    vars:
      playbook_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    hosts: "{{ match_host }}"
    tasks:
      - name: Get all roles
        include_vars:
          file: roles/requirements.yml
          name: requirements
      - name: Run playbook roles
        include_role:
          name: "{{ role.name }}"
        loop: "{{ requirements.roles }}"
        loop_control:
          loop_var: role