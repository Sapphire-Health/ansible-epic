---
  - name: Provision Epic Server
    vars:
      playbook_user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    hosts: "{{ match_host }}"
    tasks:
      - name: Create Users and Groups
        include_role:
          name: ansible-epic-users-and-groups
      - name: Create Directories and Set Permissions
        include_role:
          name: ansible-epic-directories-and-permissions
      - name: Configure SSH
        include_role:
          name: ansible-epic-ssh-config
      - name: Configure the firewall
        include_role:
          name: ansible-epic-firewalld